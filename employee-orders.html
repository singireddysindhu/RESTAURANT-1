<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guramrit Restro & Cafe | Employee Orders</title>
  <link rel="stylesheet" href="employee-pages.css" />
</head>
<body>
  <main class="employee-shell">
    <header class="topbar">
      <a class="brand-link" href="employee-dashboard.html">
        <div class="brand-copy">
          <strong>Guramrit Restro & Cafe</strong>
          <span>Employee Orders</span>
        </div>
      </a>
      <div class="session-pill">Signed in as <span data-user-email>guest</span></div>
    </header>

    <section class="page-grid">
      <article class="tracking-card">
        <p class="section-badge">Order Tracking</p>
        <h1>Current order status</h1>
        <p>Track each order from placement to delivery with live distance and ETA values from the backend.</p>

        <div class="tracking-list" id="employee-order-list"></div>
      </article>

      <aside class="list-card">
        <p class="section-badge">Live view</p>
        <h2>Order ID and status</h2>
        <div class="mini-grid" id="employee-order-meta"></div>
      </aside>
    </section>
  </main>

  <nav class="nav-shell" aria-label="Employee navigation">
    <a class="nav-item" href="employee-dashboard.html"><span class="icon">🏠</span><span class="label">Dashboard</span></a>
    <a class="nav-item active" href="employee-orders.html"><span class="icon">📦</span><span class="label">Orders</span></a>
    <a class="nav-item" href="employee-attendance.html"><span class="icon">🕒</span><span class="label">Attendance</span></a>
    <a class="nav-item" href="employee-notifications.html"><span class="icon">🔔</span><span class="label">Notifications</span></a>
    <a class="nav-item" href="employee-profile.html"><span class="icon">👤</span><span class="label">Profile</span></a>
  </nav>

  <script src="order-store.js"></script>
  <script src="employee-nav.js"></script>
  <script src="employee-orders.js"></script>
</body>
</html>
