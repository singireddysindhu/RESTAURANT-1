<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guramrit Restro & Cafe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="splash-shell" aria-label="Guramrit Restro & Cafe splash screen">
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-3" aria-hidden="true"></div>

    <section class="splash-card">
      <div class="logo-wrap chef-wrap" aria-hidden="true">
        <svg class="logo-mark chef-mark" viewBox="0 0 160 160" role="img" aria-label="Animated chef illustration">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff4d2d" />
              <stop offset="52%" stop-color="#ff7a00" />
              <stop offset="100%" stop-color="#c61f1f" />
            </linearGradient>
            <linearGradient id="steamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#fff3ea" />
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6" />
            </linearGradient>
          </defs>
          <circle cx="80" cy="80" r="70" fill="rgba(255,255,255,0.92)" stroke="url(#ringGradient)" stroke-width="10" />
          <path d="M50 54c8-18 23-27 30-27s22 9 30 27l-6 4H56l-6-4Z" fill="#ffffff" stroke="#ff7a00" stroke-width="4" />
          <path d="M46 60h68c4 0 7 3 7 7v5c0 4-3 7-7 7H46c-4 0-7-3-7-7v-5c0-4 3-7 7-7Z" fill="#ffebe2" stroke="#c61f1f" stroke-width="4" />
          <circle cx="80" cy="98" r="25" fill="#ffd9c7" stroke="#8f1111" stroke-width="3" />
          <path d="M61 127c7-9 13-14 19-14s12 5 19 14" fill="none" stroke="#8f1111" stroke-width="5" stroke-linecap="round" />
          <path d="M62 82h36" stroke="#ff7a00" stroke-width="5" stroke-linecap="round" />
          <circle cx="71" cy="95" r="2.6" fill="#8f1111" />
          <circle cx="89" cy="95" r="2.6" fill="#8f1111" />
          <path d="M72 105c5 4 11 4 16 0" fill="none" stroke="#8f1111" stroke-width="3" stroke-linecap="round" />
          <path class="steam-line steam-1" d="M56 140c-4-9-4-16 2-22" fill="none" stroke="url(#steamGradient)" stroke-width="5" stroke-linecap="round" />
          <path class="steam-line steam-2" d="M80 140c-4-9-4-16 2-22" fill="none" stroke="url(#steamGradient)" stroke-width="5" stroke-linecap="round" />
          <path class="steam-line steam-3" d="M104 140c-4-9-4-16 2-22" fill="none" stroke="url(#steamGradient)" stroke-width="5" stroke-linecap="round" />
        </svg>
      </div>

      <div class="title-block">
        <p class="eyebrow">Welcome to</p>
        <h1>Guramrit Restro & Cafe</h1>
        <p class="tagline">Delicious Food Delivered Fresh</p>
      </div>

      <div class="loader" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <p class="loading-text">Preparing your experience</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
